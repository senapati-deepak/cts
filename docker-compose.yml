version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: utelcom_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent-app:
    build: .
    container_name: utelcom_agent
    environment:
      # Point to the networked Ollama container instead of localhost
      - LLM_BASE_URL=http://ollama:11434/v1
    depends_on:
      - ollama
    # Keep the container alive for the evaluator to execute commands
    command: tail -f /dev/null 

volumes:
  ollama_data: